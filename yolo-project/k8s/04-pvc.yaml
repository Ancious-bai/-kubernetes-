apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: yolo-workspace
  namespace: yolo-system
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-storage
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: yolo-mysql-data
  namespace: yolo-system
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-storage
  resources:
    requests:
      storage: 10Gi
