server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 10GB
      max-request-size: 10GB
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:k8s_yolo_db}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  project-root: ${PROJECT_ROOT:./}
  training-image: ${TRAINING_IMAGE:yolov8-project:latest}
  pvc-name: ${PVC_NAME:yolo-workspace}
  mount-path: ${MOUNT_PATH:/app/data}
  use-pvc: ${USE_PVC:false}
  k8s-namespace: ${K8S_NAMESPACE:default}

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJwtTokenGenerationWhichShouldBeLongEnoughForHS256Algorithm2024}
